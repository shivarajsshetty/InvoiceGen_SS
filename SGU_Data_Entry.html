<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meal Data Entry</title>
<style>
  :root {
    --bg:#f5f4f0; --surface:#fff; --border:#e4e1d8; --border2:#c8c4b8;
    --text:#1c1b18; --text2:#6b6760; --text3:#9e9b92;
    --accent:#1a56b0; --accent-light:#e8f0fb; --accent-dark:#0f3d82;
    --danger:#c0392b; --danger-light:#fdf0ee;
    --success:#1a7a3c; --success-light:#e8f5ed;
    --radius:12px; --radius-sm:8px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.5; min-height:100vh; padding-bottom:40px; }
  .pw-overlay{ position:fixed; inset:0; background:var(--accent); z-index:999; display:flex; align-items:center; justify-content:center; padding:24px; }
  .pw-box{ background:#fff; border-radius:var(--radius); padding:28px 24px; width:100%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
  .pw-logo{ font-size:28px; text-align:center; margin-bottom:8px; }
  .pw-title{ font-size:18px; font-weight:700; text-align:center; margin-bottom:4px; }
  .pw-sub{ font-size:13px; color:var(--text2); text-align:center; margin-bottom:20px; }
  .pw-input{ width:100%; padding:13px 14px; font-size:16px; border:1.5px solid var(--border); border-radius:var(--radius-sm); outline:none; font-family:inherit; background:var(--bg); color:var(--text); text-align:center; }
  .pw-input:focus{ border-color:var(--accent); }
  .pw-btn{ width:100%; padding:14px; font-size:15px; font-weight:700; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; margin-top:12px; font-family:inherit; }
  .pw-btn:active{ background:var(--accent-dark); }
  .pw-err{ font-size:13px; color:var(--danger); text-align:center; margin-top:10px; min-height:18px; }
  .pw-overlay.hide{ display:none; }
  .header{ background:var(--accent); color:#fff; padding:16px 20px 14px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .header h1{ font-size:17px; font-weight:600; }
  .header-sub{ font-size:12px; opacity:.75; margin-top:2px; }
  .month-bar{ background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; }
  .month-bar label{ font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
  .month-bar input[type=month]{ flex:1; padding:7px 10px; font-size:14px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); outline:none; font-family:inherit; }
  .month-bar input[type=month]:focus{ border-color:var(--accent); }
  .load-btn{ padding:7px 14px; font-size:13px; font-weight:600; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; white-space:nowrap; font-family:inherit; }
  .load-btn:active{ background:var(--accent-dark); }
  .load-btn:disabled{ opacity:.5; }
  .content{ padding:16px; max-width:600px; margin:0 auto; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden; }
  .card-header{ padding:12px 16px; border-bottom:1px solid var(--border); font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; justify-content:space-between; }
  .form-body{ padding:16px; }
  .form-grid{ display:grid; grid-template-columns:minmax(0,1.4fr) minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); gap:10px; margin-bottom:12px; align-items:end; }
  .form-counts{ display:contents; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }
  .field input{ padding:11px 10px; font-size:15px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); outline:none; font-family:inherit; -webkit-appearance:none; }
  .field input:focus{ border-color:var(--accent); background:#fff; }
  .field input[type=number]{ text-align:center; }
  .submit-btn{ width:100%; padding:14px; font-size:15px; font-weight:700; font-family:inherit; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .submit-btn:active{ background:var(--accent-dark); }
  .submit-btn:disabled{ opacity:.5; }
  .msg{ padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:12px; display:none; }
  .msg.show{ display:block; }
  .msg.ok{ background:var(--success-light); color:var(--success); border:1px solid #b2ddc0; }
  .msg.err{ background:var(--danger-light); color:var(--danger); border:1px solid #e8c5c2; }
  .msg.info{ background:var(--accent-light); color:var(--accent); border:1px solid #b8cff0; }
  .tbl-wrap{ overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:13px; min-width:300px; }
  thead th{ padding:8px 10px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); border-bottom:1px solid var(--border); background:var(--bg); }
  thead th.r{ text-align:right; }
  tbody td{ padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:last-child td{ border-bottom:none; }
  .r{ text-align:right; font-variant-numeric:tabular-nums; }
  tfoot td{ padding:9px 10px; font-weight:700; font-size:13px; background:var(--accent-light); color:var(--accent); border-top:2px solid var(--accent); }
  .row-acts{ display:flex; gap:6px; justify-content:flex-end; }
  .act{ padding:5px 8px; font-size:12px; border-radius:5px; border:1px solid var(--border); background:var(--surface); cursor:pointer; color:var(--text2); font-family:inherit; }
  .act.del{ color:var(--danger); border-color:#e8c5c2; }
  .dl-btn{ display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px; font-size:13px; font-weight:600; background:var(--surface); color:var(--accent); border:1.5px solid var(--accent); border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; }
  .dl-btn:active{ background:var(--accent-light); }
  .empty{ padding:28px 20px; text-align:center; color:var(--text3); font-size:14px; }
  .not-cfg{ background:#fff8e1; border:1px solid #ffe082; border-radius:var(--radius-sm); padding:14px; font-size:13px; color:#7d6608; line-height:1.6; text-align:center; }
  .spin{ display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-logo">🔐</div>
    <div class="pw-title">Meal Data Entry</div>
    <div class="pw-sub">Enter the access password to continue</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()"/>
    <button class="pw-btn" onclick="unlock()">Unlock</button>
    <div class="pw-err" id="pw-err"></div>
  </div>
</div>

<div class="header">
  <h1>Meal Data Entry</h1>
  <div class="header-sub" id="header-sub">Loading...</div>
</div>

<div class="month-bar">
  <label>Month</label>
  <input type="month" id="month-picker" onchange="loadMonth()">
  <button class="load-btn" id="load-btn" onclick="loadMonth()">↻ Load</button>
</div>

<div class="content">
  <div class="msg" id="main-msg"></div>
  <div class="not-cfg" id="not-cfg" style="display:none">
    This app is not configured yet.<br>
    Run <strong>encrypt_token.html</strong> to generate your encrypted payload, then paste it into this file.
  </div>

  <div class="card" id="form-card">
    <div class="card-header">Add / Update Entry</div>
    <div class="form-body">
      <div class="form-grid">
        <div class="field"><label>Date</label><input type="date" id="f-date"/></div>
          <div class="field"><label>Breakfast</label><input type="number" id="f-b" min="0" value="0" inputmode="numeric"/></div>
          <div class="field"><label>Lunch</label><input type="number" id="f-l" min="0" value="0" inputmode="numeric"/></div>
          <div class="field"><label>Dinner</label><input type="number" id="f-d" min="0" value="0" inputmode="numeric"/></div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitEntry()">
        <span id="submit-lbl">+ Save Entry</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span id="tbl-title">Entries</span>
      <span id="tbl-count" style="font-size:11px;color:var(--text3);font-weight:400"></span>
    </div>
    <div id="tbl-wrap">
      <div class="empty">No entries yet for this month</div>
    </div>
    <div style="padding:12px 14px 14px;border-top:1px solid var(--border);display:none" id="dl-wrap">
      <button class="dl-btn" onclick="downloadCSV()">&#8595; Download CSV</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  PASTE YOUR ENCRYPTED PAYLOAD BETWEEN THE QUOTES BELOW
// ============================================================
const ENCRYPTED_PAYLOAD = 'pCCCpGbu1YdD0D+BNMUTh6WV87/0ByHirtwNiu/fGTQpdsxnuzsVS9GXU86CsdqEV/JaLipQW4PA1NSqRo+ouAO/4uEk+3+e2nRBFcgBk+Qd3bwJmavFosEBlGTluc0D+ZZMoP813/4CmC+/9Ra4nj0QxmAFyAxK7AtiYA1RpzBho1ELDtYyEAgHT+xe9UAZk44iZ3I/hceMLqkQsfBMTf3tIbDRMXkhaQsmdD+vstNOSlRO/AE2psAS8HRy+BBo/fiJYEOZxJPJ8ojRfOPMTEMGTs10u8h9ew==';
// ============================================================

let cfg = null, entries = [], fileSha = null;

async function decrypt(b64, password) {
  const raw    = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt   = raw.slice(0,16), iv = raw.slice(16,28), data = raw.slice(28);
  const enc    = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key    = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:200000, hash:'SHA-256'},
    keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

async function unlock() {
  if (!ENCRYPTED_PAYLOAD) {
    document.getElementById('pw-overlay').classList.add('hide');
    document.getElementById('not-cfg').style.display = '';
    document.getElementById('form-card').style.display = 'none';
    return;
  }
  const pw  = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-err');
  if (!pw) { err.textContent = 'Please enter the password.'; return; }
  err.textContent = 'Verifying...';
  try {
    cfg = await decrypt(ENCRYPTED_PAYLOAD, pw);
    document.getElementById('pw-overlay').classList.add('hide');
    document.getElementById('header-sub').textContent = cfg.username + '/' + cfg.repo;
    loadMonth();
  } catch(e) {
    err.textContent = 'Wrong password. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    cfg = null;
  }
}

function filePath(ym) {
  const fname = 'data_' + ym.replace('-','_') + '.csv';
  return cfg.folder ? cfg.folder + '/' + fname : fname;
}
function apiUrl(ym) { return 'https://api.github.com/repos/' + cfg.username + '/' + cfg.repo + '/contents/' + filePath(ym); }
function ghHeaders() { return {'Authorization':'Bearer ' + cfg.token,'Content-Type':'application/json','Accept':'application/vnd.github+json'}; }

async function loadFromGH(ym) {
  const res = await fetch(apiUrl(ym), {headers:ghHeaders()});
  if (res.status === 404) { fileSha = null; return []; }
  if (!res.ok) throw new Error('GitHub ' + res.status);
  const data = await res.json();
  fileSha = data.sha;
  const csv = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
  return parseCSV(csv);
}

async function saveToGH(ym, rows) {
  const content = btoa(unescape(encodeURIComponent(toCSV(rows))));
  const body    = {message:'Update meal data ' + ym, content, ...(fileSha ? {sha:fileSha} : {})};
  const res     = await fetch(apiUrl(ym), {method:'PUT', headers:ghHeaders(), body:JSON.stringify(body)});
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'GitHub ' + res.status); }
  fileSha = (await res.json()).content.sha;
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const start = /date/i.test(lines[0]) ? 1 : 0;
  return lines.slice(start).map(l => {
    const [date,b,l2,d] = l.split(',').map(s=>s.trim());
    return {date, b:+b||0, l:+l2||0, d:+d||0};
  }).filter(r=>r.date).sort((a,b)=>a.date.localeCompare(b.date));
}
function toCSV(rows) {
  return ['date,breakfast,lunch,dinner', ...rows.map(r=>r.date+','+r.b+','+r.l+','+r.d)].join('\n') + '\n';
}

async function loadMonth() {
  if (!cfg) return;
  const ym = document.getElementById('month-picker').value;
  if (!ym) return;
  setLoadLoading(true); showMsg('Loading...','info');
  try {
    entries = await loadFromGH(ym);
    renderTable(ym);
    showMsg(entries.length ? 'Loaded ' + entries.length + ' entries.' : 'No entries yet for this month.', entries.length ? 'ok' : 'info');
  } catch(e) { showMsg('Error: ' + e.message, 'err'); }
  setLoadLoading(false);
}

async function submitEntry() {
  if (!cfg) return;
  const ym = document.getElementById('month-picker').value;
  const date = document.getElementById('f-date').value;
  const b = parseInt(document.getElementById('f-b').value)||0;
  const l = parseInt(document.getElementById('f-l').value)||0;
  const d = parseInt(document.getElementById('f-d').value)||0;
  if (!ym)   { showMsg('Select a month first.','err'); return; }
  if (!date) { showMsg('Select a date.','err'); return; }
  if (!date.startsWith(ym)) { showMsg('Date must be within ' + ym + '.','err'); return; }
  const idx = entries.findIndex(e=>e.date===date);
  if (idx>=0) entries[idx]={date,b,l,d}; else entries.push({date,b,l,d});
  entries.sort((a,b)=>a.date.localeCompare(b.date));
  setSubmitLoading(true);
  try {
    await saveToGH(ym, entries);
    showMsg('Saved ' + fmtDate(date) + '.','ok');
    renderTable(ym);
    document.getElementById('f-b').value='0';
    document.getElementById('f-l').value='0';
    document.getElementById('f-d').value='0';
  } catch(e) { showMsg('Error: ' + e.message,'err'); }
  setSubmitLoading(false);
}

async function deleteEntry(date) {
  if (!confirm('Delete entry for ' + fmtDate(date) + '?')) return;
  const ym = document.getElementById('month-picker').value;
  entries = entries.filter(e=>e.date!==date);
  try { await saveToGH(ym, entries); showMsg('Deleted ' + fmtDate(date) + '.','ok'); renderTable(ym); }
  catch(e) { showMsg('Error: ' + e.message,'err'); }
}

function editEntry(date) {
  const r = entries.find(e=>e.date===date); if(!r) return;
  document.getElementById('f-date').value=r.date;
  document.getElementById('f-b').value=r.b;
  document.getElementById('f-l').value=r.l;
  document.getElementById('f-d').value=r.d;
  window.scrollTo({top:0,behavior:'smooth'});
}

function downloadCSV() {
  const ym = document.getElementById('month-picker').value || 'data';
  const a  = document.createElement('a');
  a.href   = URL.createObjectURL(new Blob([toCSV(entries)],{type:'text/csv'}));
  a.download = 'data_' + ym.replace('-','_') + '.csv'; a.click();
}

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s){ const d=new Date(s+'T00:00:00'); return d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear(); }

function renderTable(ym) {
  const [y,m] = ym.split('-');
  document.getElementById('tbl-title').textContent = MON[+m-1]+' '+y;
  document.getElementById('tbl-count').textContent = entries.length ? entries.length+' days' : '';
  document.getElementById('dl-wrap').style.display = entries.length ? '' : 'none';
  const wrap = document.getElementById('tbl-wrap');
  if (!entries.length) { wrap.innerHTML='<div class="empty">No entries yet for this month</div>'; return; }
  const tB=entries.reduce((s,r)=>s+r.b,0), tL=entries.reduce((s,r)=>s+r.l,0), tD=entries.reduce((s,r)=>s+r.d,0);
  wrap.innerHTML = '<div class="tbl-wrap"><table>' +
    '<thead><tr><th>Date</th><th class="r">Bfast</th><th class="r">Lunch</th><th class="r">Dinner</th><th class="r">Total</th><th></th></tr></thead>' +
    '<tbody>' + entries.map(r=>
      '<tr><td>'+fmtDate(r.date)+'</td><td class="r">'+r.b+'</td><td class="r">'+r.l+'</td><td class="r">'+r.d+'</td>' +
      '<td class="r" style="font-weight:600">'+(r.b+r.l+r.d)+'</td>' +
      '<td><div class="row-acts"><button class="act" onclick="editEntry(\''+r.date+'\')">&#9998;</button>' +
      '<button class="act del" onclick="deleteEntry(\''+r.date+'\')">&#10005;</button></div></td></tr>'
    ).join('') + '</tbody>' +
    '<tfoot><tr><td>Total</td><td class="r">'+tB+'</td><td class="r">'+tL+'</td><td class="r">'+tD+'</td><td class="r">'+(tB+tL+tD)+'</td><td></td></tr></tfoot>' +
    '</table></div>';
}

function showMsg(t,type){ const el=document.getElementById('main-msg'); el.textContent=t; el.className='msg '+type+' show'; if(type==='ok') setTimeout(()=>el.classList.remove('show'),3000); }
function setLoadLoading(on){ const b=document.getElementById('load-btn'); b.disabled=on; b.textContent=on?'...':'↻ Load'; }
function setSubmitLoading(on){ const b=document.getElementById('submit-btn'); b.disabled=on; document.getElementById('submit-lbl').innerHTML=on?'<span class="spin"></span> Saving...':'+ Save Entry'; }

(function(){
  const now=new Date();
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('month-picker').value=ym;
  document.getElementById('f-date').value=now.toISOString().split('T')[0];
  if(!ENCRYPTED_PAYLOAD){ document.getElementById('pw-overlay').classList.add('hide'); document.getElementById('not-cfg').style.display=''; document.getElementById('form-card').style.display='none'; }
  else document.getElementById('pw-input').focus();
})();
</script>
</body>
</html>
